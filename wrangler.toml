name = "glm-free-api-worker"
main = "src/index.ts"
compatibility_date = "2024-05-12"

[vars]
SIGN_SECRET = "8a1317a7468aa3ad86e997d08f3f31cb"
# 管理 API 的保护密钥，建议部署前修改为随机强密码
# 如未设置，管理接口将开放访问（不推荐用于生产环境）
ADMIN_KEY = "changeme"

# 可选：直接填写从 app.fireworks.ai /playground 页面中提取的 internal_ 开头 key
# FIREWORKS_INTERNAL_API_KEY = "internal_xxx"

# 可选：填写 app.fireworks.ai 的 session JSON
# 支持 {"session": {...}, "userContext": {...}} 或直接 {"accessToken":"...","refreshToken":"...","idToken":"...",...}
# 配置后，请求 /v1/chat/completions 且 model 以 accounts/fireworks/models/ 开头时，
# Worker 会自动刷新 session 并从 /playground 页面提取 internal key
# FIREWORKS_SESSION_JSON = "{\"accessToken\":\"...\",\"refreshToken\":\"...\",\"idToken\":\"...\",\"email\":\"...\",\"sub\":\"...\",\"accountID\":\"...\",\"hasAccount\":true,\"accountState\":2}"

# KV Namespace 绑定，用于存储 api_key -> refresh_token 映射
# 首次部署前需执行：npx wrangler kv:namespace create "GLM_TOKENS"
# 然后将输出的 id 填入下方
[[kv_namespaces]]
binding = "GLM_TOKENS"
id = ""  # <-- 替换为你创建 KV 后得到的 id
